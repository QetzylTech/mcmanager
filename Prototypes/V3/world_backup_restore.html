<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MC Manager - Backups & Restore</title>
    <link rel="stylesheet" href="static/global.css" />
    <link rel="icon" type="image/svg+xml" href="https://static.wikia.nocookie.net/logopedia/images/e/e3/Minecraft_Launcher.svg/revision/latest/scale-to-width-down/250?cb=20230616222246" />
  </head>
  <body class="mcweb">
    <div class="shell">
      <!-- World nav only -->
      <nav class="shell-nav" aria-label="World navigation">
        <div class="nav-title">World</div>
        <div class="nav-list">
          <a class="nav-link" href="index.html">Homepage</a>
          <a class="nav-link" href="world_main.html">World Main</a>
          <a class="nav-link active" href="world_backup_restore.html">Backups & Restore</a>
          <a class="nav-link" href="world_logs.html">World Logs</a>
          <a class="nav-link" href="file_manager.html">File Manager</a>
          <a class="nav-link" href="world_maintenance_retention.html">World Maintenance</a>
          <a class="nav-link" href="world_setup.html">World Setup</a>
          <a class="nav-link" href="world_properties.html">World Properties</a>
        </div>
      </nav>

      <main class="panes" aria-label="Page content">
        <!-- Pane: Backups list -->
        <article class="pane pane-stationary pane-list">
          <header class="pane-title-area">
            <h2>Backups</h2>
            <div class="pane-head-actions">
              <button class="btn-action-teal" type="button">Backup Now</button>
            </div>
          </header>

          <section class="pane-content-area">
            <ul class="list" aria-label="Backups list">
              <li>
                2026-05-12 22:00 — Full Backup
                <div class="mt-8 list-actions-row">
                  <button class="btn-action-blue" type="button">Restore</button>
                  <button class="btn-action-blue" type="button">Details</button>
                </div>
              </li>
              <li>
                2026-05-12 12:00 — Incremental
                <div class="mt-8 list-actions-row">
                  <button class="btn-action-blue" type="button">Restore</button>
                  <button class="btn-action-blue" type="button">Details</button>
                </div>
              </li>
            </ul>
          </section>
        </article>

        <!-- Pane: Restore flow -->
        <article class="pane pane-stationary pane-form">
          <header class="pane-title-area">
            <h2>Restore</h2>
            <div class="pane-head-actions">
              <button class="btn-action-blue" type="button">Select Backup</button>
            </div>
          </header>

          <section class="pane-content-area">
            <div class="row row-start mt-0">
              <div class="ui-flex-field">
                <p>Restore Mode</p>
                <input class="ui-text-input" type="text" value="Dry Run / Wet Run" aria-label="Restore mode" />
              </div>

              <div class="ui-flex-field">
                <p>Target World</p>
                <input class="ui-text-input" type="text" value="Example World" aria-label="Target world" />
              </div>
            </div>

            <div class="row mt-12">
              <button class="btn-action-blue" type="button">Run Dry Restore</button>
              <button class="btn-action-red" type="button">Run Restore</button>
            </div>
          </section>
        </article>
      </main>
    </div>
  </body>
</html>
