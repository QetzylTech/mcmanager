<!doctype html>
<main class="mcweb-page content" data-page-key="servers" data-page-title="Server Selection">
  <div class="wrap page-panes page-panes--manager">
    <section class="panel page-pane pane-primary" aria-label="Worlds selection">
      <div class="pane-head">
        <div class="pane-head-row">
          <h1 class="pane-title">Server Selection</h1>

          <div class="pane-head-actions">
            <button class="btn-start js-world-open-create" type="button">Create Server</button>
          </div>
        </div>
      </div>

      <div class="pane-content">
        <p class="manager-page-copy">Choose which server the existing console, backup, cleanup, and log pages should operate on.</p>

        <div class="manager-inline-note js-world-current-selection" aria-live="polite"></div>

        <div class="server-card-grid js-world-list" role="list"></div>
      </div>
    </section>
  </div>
</main>
