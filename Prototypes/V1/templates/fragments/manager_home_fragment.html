<!doctype html>
<main class="mcweb-page content" data-page-key="manager_home" data-page-title="Home">
  <div class="wrap page-panes page-panes--manager">
    <!-- Manager Home: Overview -->
    <section class="panel page-pane pane-primary" aria-label="Manager Home overview">
      <div class="pane-head">
        <div class="pane-head-row">
          <h1 class="pane-title">Manager Home</h1>

          <div class="pane-head-actions">
            <button class="btn-backup js-manager-home-open-selection" type="button">Select Server</button>
            <button class="btn-start js-manager-home-open-create" type="button">Create Server</button>
          </div>
        </div>
      </div>

      <div class="pane-content">
        <div class="manager-current-card">
          <div class="manager-current-copy">
            <p class="manager-current-label">Current server</p>
            <h2 class="manager-current-title js-manager-current-name">-</h2>
            <p class="manager-current-meta js-manager-current-meta">-</p>
          </div>

          <button class="btn-backup js-manager-home-open-console" type="button">Open Console</button>
        </div>

        <div class="manager-stats-grid">
          <div class="stats-group">
            <p class="group-title">Server Stats</p>
            <div class="status-row">
              <span>Total servers: <strong class="js-manager-total-servers">0</strong></span>
              <span>Running: <strong class="js-manager-running-servers">0</strong></span>
            </div>
          </div>

          <div class="stats-group">
            <p class="group-title">Storage & Jobs</p>
            <div class="status-row">
              <span>Storage: <strong class="js-manager-storage-summary">-</strong></span>
              <span>Next backup: <strong class="js-manager-next-backup-summary">-</strong></span>
            </div>
          </div>

          <div class="stats-group">
            <p class="group-title">Current Selection</p>
            <div class="status-row">
              <span>Status: <strong class="js-manager-current-status">-</strong></span>
              <span>Players: <strong class="js-manager-current-players">-</strong></span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Manager Home: Server list -->
    <section class="panel page-pane pane-primary" aria-label="Servers overview">
      <div class="pane-head">
        <div class="pane-head-row">
          <h2 class="pane-title">Server Overview</h2>
        </div>
      </div>

      <div class="pane-content">
        <div class="server-card-grid js-manager-server-list"></div>
      </div>
    </section>

    <!-- Manager Home: Alerts -->
    <section class="panel page-pane pane-primary" aria-label="Manager notes">
      <div class="pane-head">
        <div class="pane-head-row">
          <h2 class="pane-title">Manager Notes</h2>
        </div>
      </div>

      <div class="pane-content">
        <div class="js-manager-alert-list manager-alert-list"></div>
      </div>
    </section>
  </div>
</main>
